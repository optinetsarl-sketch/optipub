# ── OPTIPUB : app seule (la base est sur MongoDB Atlas, dans le cloud) ──
# Déploiement serveur :  docker compose up -d --build
services:
  optipub:
    build: .
    container_name: optipub
    restart: unless-stopped
    ports:
      - "5001:5000"          # le reverse proxy / tunnel pointera vers ce port
    env_file:
      - app/backend/.env.production
    volumes:
      - optipub_uploads:/app/backend/uploads

volumes:
  optipub_uploads:
